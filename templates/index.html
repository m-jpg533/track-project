<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>📍 多朋友追蹤器</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body { font-family: Arial; margin: 0; padding: 20px; }
    #map { height: 400px; width: 100%; margin-top: 10px; }
    input, button { padding: 8px; font-size: 16px; margin: 5px 0; }
    #status { margin-top: 10px; }
  </style>
</head>
<body>
  <h1>📍 多朋友追蹤器</h1>

  <label>你的名稱 / ID：</label>
  <input type="text" id="user_id" placeholder="輸入你的名字">
  <button onclick="recordLocation()">開始追蹤</button>

  <p id="status"></p>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    let map = L.map('map').setView([25.03, 121.56], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

    let marker;

    function sendPosition(position) {
      const lat = position.coords.latitude;
      const lng = position.coords.longitude;
      const user_id = document.getElementById('user_id').value || 'unknown';

      document.getElementById("status").innerText = "📍 " + user_id + ": " + lat.toFixed(6) + ", " + lng.toFixed(6);

      if (marker) marker.setLatLng([lat, lng]);
      else marker = L.marker([lat, lng]).addTo(map);

      map.setView([lat, lng], 16);

      fetch('/save-location', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id, latitude: lat, longitude: lng })
      })
      .then(res => res.json())
      .then(data => console.log("✅ 已送出", data))
      .catch(err => console.log("❌ 傳送失敗", err));
    }

    function errorHandler(err) {
      console.log("❌ GPS錯誤:", err);
      document.getElementById("status").innerText = "❌ 定位失敗";
    }

    function recordLocation() {
      if (!document.getElementById('user_id').value) {
        alert('請輸入你的名稱或ID');
        return;
      }
      navigator.geolocation.watchPosition(sendPosition, errorHandler, { enableHighAccuracy: true, maximumAge: 1000 });
    }
  </script>
</body>
</html>
