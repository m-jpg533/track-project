<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>📍 即時朋友追蹤地圖</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<style>
  body { margin:0; padding:0; }
  #map { height: 100vh; width: 100%; }
</style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>

let map = L.map('map').setView([25.03, 121.56], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

let layers = [];

function loadData() {
  fetch('/logs-data')
    .then(res => res.json())
    .then(data => {

      // 清除舊圖層
      layers.forEach(layer => map.removeLayer(layer));
      layers = [];

      const friends = {};

      data.forEach(loc => {
        const id = loc.user_id || 'unknown';
        if (!friends[id]) friends[id] = [];
        friends[id].push([loc.latitude, loc.longitude, loc.timestamp]);
      });

      const colors = ['red','blue','green','orange','purple','brown','pink','yellow'];
      let colorIndex = 0;

      for (const [user, coords] of Object.entries(friends)) {

        const latlngs = coords.map(c => [c[0], c[1]]);
        const color = colors[colorIndex % colors.length];
        colorIndex++;

        // 軌跡線
        let line = L.polyline(latlngs, {color: color}).addTo(map);
        layers.push(line);

        // 最後位置
        const last = coords[coords.length - 1];

        let marker = L.marker([last[0], last[1]])
          .addTo(map)
          .bindPopup(`<b>${user}</b><br>${last[2]}`);

        layers.push(marker);
      }

    })
    .catch(err => console.log("❌ 載入失敗", err));
}

// 每3秒更新
setInterval(loadData, 3000);

// 初始載入
loadData();

</script>

</body>
</html>
